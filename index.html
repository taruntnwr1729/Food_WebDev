<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chikki - All about chicken</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Forum&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header active" data-header>
        <div class="container">

            <!-- Logo -->
            <a href="#" class="logo">
                <img src="./assets/images/logo.png" width="130" height="45" alt="Chikki Home Page">
            </a>

            <!-- Navigation Bar -->
            <nav class="navbar" data-navbar>  
                <button class="nav-close-btn" aria-label="close menu">
                    <ion-icon name="close-outline" aria-hidden="true"></ion-icon>
                </button>
                
                <a href="#" class="nav-logo">
                    <img src="./assets/images/logo.png" width="175" height="61" alt="Chikki Home Page">
                </a>
                
                <ul class="navbar-list">
                    <li class="navbar-item"><a href="#" class="navbar-link" data-nav-link>Home</a></li>
                    <li class="navbar-item"><a href="#" class="navbar-link" data-nav-link>Menu</a></li>
                    <li class="navbar-item"><a href="#" class="navbar-link" data-nav-link>About</a></li>
                    <li class="navbar-item"><a href="#" class="navbar-link" data-nav-link>Shop</a></li>
                    <li class="navbar-item"><a href="#" class="navbar-link" data-nav-link>Blog</a></li>
                </ul>

                <!-- FIXED: Wrapped the text and icon back inside the link tag -->
                <a href="#" class="btn">
                    <span class="span">Book a Table</span>
                    <ion-icon name="arrow-forward-outline" aria-hidden="true"></ion-icon>
                </a>
            </nav>

            <!-- Header Contact & CTA Actions -->
            <div class="header-action">
                <!-- FIXED: Changed 'tell:' to 'tel:' and removed inside spaces -->
                <a href="tel:00012345689" class="call">
                    <ion-icon name="call-outline" aria-hidden="true"></ion-icon>
                    <span class="span">000 123 456 89</span>
                </a>
                <a href="#" class="btn">
                    <span class="span">Book a Table</span>
                    <ion-icon name="arrow-forward-outline" aria-hidden="true"></ion-icon>
                </a>
            </div>

            <!-- Mobile Menu Toggler -->
            <button class="nav-open-btn" aria-label="open menu" data-nav-toggler>
                <ion-icon name="menu-outline" aria-hidden="true"></ion-icon>
            </button>

            <!-- Dark Overlay for Mobile Sidebar -->
            <div class="overlay" data-nav-toggler data-overlay></div>

        </div>
    </header>

    <!-- Scripts -->
    <script src="assets/js/script.js" defer></script>
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

</body>
</html>
